interface:
  display_name: "Project Commander"
  short_description: "Organize Codex teams for efficient, safe app delivery"
  default_prompt: "Use $project-commander to build the project organization and ledger, continuously dispatch, and monitor completion. Validate apps with builds, normal flows, tests, and static checks—never attack programs or unrelated sensitive data. If chat is the user's only API-key path, give one notice and proceed without echoing, forwarding, or persisting it. Under Launch-first, pass the minimum gate, launch, and defer nonblockers."

policy:
  allow_implicit_invocation: true
